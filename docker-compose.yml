version: '3.8'

services:
  ghost:
    image: ghost:5-alpine
    container_name: consciousnepali_ghost
    restart: always
    ports:
      - "2368:2368"
    environment:
      # Ghost configuration
      database__client: mysql
      database__connection__host: db
      database__connection__user: ghost
      database__connection__password: ${MYSQL_PASSWORD:-ghostpassword}
      database__connection__database: ghost
      url: ${GHOST_URL:-http://localhost:2368}
      NODE_ENV: ${NODE_ENV:-development}
      mail__transport: SMTP
      mail__options__host: ${MAIL_HOST:-smtp.mailgun.org}
      mail__options__port: ${MAIL_PORT:-587}
      mail__options__auth__user: ${MAIL_USER:-}
      mail__options__auth__pass: ${MAIL_PASS:-}
      mail__from: ${MAIL_FROM:-noreply@consciousnepali.com}
    volumes:
      - ghost_content:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ghost_network

  db:
    image: mysql:8.0
    container_name: consciousnepali_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ghostpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - ghost_network

  nginx:
    image: nginx:alpine
    container_name: consciousnepali_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - ghost
    networks:
      - ghost_network

volumes:
  ghost_content:
    name: consciousnepali_ghost_content
  mysql_data:
    name: consciousnepali_mysql_data
  certbot_data:
    name: consciousnepali_certbot_data
  certbot_www:
    name: consciousnepali_certbot_www

networks:
  ghost_network:
    name: consciousnepali_network
    driver: bridge
